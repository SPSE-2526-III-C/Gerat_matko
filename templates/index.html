<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local AI Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <style>
    .bubble.user {
      background: #ffe28a;
    }
    .auth-container {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .auth-container.active {
      display: flex;
    }
    .auth-form {
      background: white;
      padding: 2rem;
      border-radius: 8px;
      min-width: 300px;
    }
    .auth-form h2 {
      margin-top: 0;
    }
    .auth-form input {
      width: 100%;
      padding: 0.5rem;
      margin: 0.5rem 0;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    .auth-form button {
      width: 100%;
      padding: 0.75rem;
      margin: 0.5rem 0;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .auth-form button:hover {
      background: #2563eb;
    }
    .auth-form button.secondary {
      background: #6b7280;
    }
    .auth-form button.secondary:hover {
      background: #4b5563;
    }
    .auth-error {
      color: #dc2626;
      margin: 0.5rem 0;
    }
  </style>
  <body>
    <div class="auth-container active" id="auth-container">
      <div class="auth-form">
        <h2>Prihlásenie</h2>
        <input type="text" id="login-username" placeholder="Používateľ" />
        <input type="password" id="login-password" placeholder="Heslo" />
        <div class="auth-error" id="login-error"></div>
        <button id="login-btn">Prihlásiť sa</button>
        <button id="register-toggle-btn" class="secondary">Registrácia</button>
      </div>
      
      <div class="auth-form" id="register-form" style="display: none;">
        <h2>Registrácia</h2>
        <input type="text" id="register-username" placeholder="Používateľ" />
        <input type="password" id="register-password" placeholder="Heslo" />
        <input type="password" id="register-password2" placeholder="Potvrď heslo" />
        <div class="auth-error" id="register-error"></div>
        <button id="register-btn">Zaregistrovať sa</button>
        <button id="login-toggle-btn" class="secondary">Späť na prihlásenie</button>
      </div>
    </div>

    <main class="app" style="display: none;" id="chat-app">
      <header class="app__header">
        <button id="logout-btn" style="position: absolute; right: 1rem;">Odhlásiť sa</button>
        <div class="status" id="status">Pripravený</div>
      </header>

      <section class="chat" id="chat"></section>

      <section class="progress">
        <div class="progress__bar" id="progress-bar"></div>
        <div class="progress__meta">
          <span id="progress-text">Čakám na vstup…</span>
          <span id="timer">0.0 s</span>
        </div>
      </section>

      <form class="composer" id="composer">
        <textarea
          id="message"
          placeholder="Napíš správu..."
          rows="2"
          required
        ></textarea>
        <button type="submit">Odoslať</button>
      </form>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
